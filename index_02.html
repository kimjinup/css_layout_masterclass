<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/style_02.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto+Slab:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <title>Document</title>
  </head>
  <body>
    <div class="phone">
      <header class="header">
        <span class="header__btn">
          <i class="fa-regular fa-hand-point-left"></i>
        </span>
        <h1 class="header__title">my cart</h1>
        <span class="header__btn">
          <i class="fas fa-bag-shopping"></i>
        </span>
      </header>
      <section class="total">
        <span class="total__price">$3,550</span>
        <span class="total__subtitle">based on your 5 items</span>
      </section>
      <section class="items">
        <article class="item">
          <div class="item__info">
            <div class="item__info-column">
              <h2 class="item__title">Pop Temple Print T-Shirt</h2>
              <h3 class="item__subtitle">limited 2002</h3>
            </div>
            <div class="item__info-column">
              <span class="item__total-price">$1,990</span>
              <div class="item__piece-price">$995 per piece</div>
            </div>
          </div>
          <div class="item__specs">
            <div class="spec">
              <span class="spec__title">Size</span>
              <span class="spec__value">48 - L</span>
            </div>
            <div class="spec">
              <span class="spec__title">QT</span>
              <span class="spec__value">2 pcs</span>
            </div>
          </div>
          <img src="images/shirt.png" class="item__photo" />
        </article>
        <article class="item">
          <div class="item__info">
            <div class="item__info-column">
              <h2 class="item__title">Pop Temple Print T-Shirt</h2>
              <h3 class="item__subtitle">limited 2002</h3>
            </div>
            <div class="item__info-column">
              <div class="item__total-price">$1,990</div>
              <div class="item__piece-price">$995 per piece</div>
            </div>
          </div>
          <div class="item__specs">
            <div class="spec">
              <span class="spec__title">Size</span>
              <span class="spec__value">48 - L</span>
            </div>
            <div class="spec">
              <span class="spec__title">QT</span>
              <span class="spec__value">2 pcs</span>
            </div>
          </div>
          <img src="https://picsum.photos/200/200" class="item__photo" />
        </article>
      </section>
    </div>
    <script
      src="https://kit.fontawesome.com/03e48ff7aa.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
